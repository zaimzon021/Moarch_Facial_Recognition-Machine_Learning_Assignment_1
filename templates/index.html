<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monarch — AI Gender Classifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #ffffff;
      --surface:  #f9f9f9;
      --surface2: #f2f2f2;
      --border:   #e5e5e5;
      --border2:  #d4d4d4;
      --text:     #0a0a0a;
      --muted:    #737373;
      --muted2:   #a3a3a3;
      --black:    #0a0a0a;
      --radius:   20px;
      --radius-sm:12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 56px;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── Subtle grid ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Wrapper ── */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: slideDown 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-ring {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 76px;
      height: 76px;
      border-radius: 22px;
      background: var(--black);
      margin-bottom: 20px;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.08),
        0 12px 40px rgba(0,0,0,0.12),
        0 2px 8px rgba(0,0,0,0.06);
      animation: logoPop 0.8s cubic-bezier(.34,1.56,.64,1) 0.1s both;
    }

    @keyframes logoPop {
      from { opacity: 0; transform: scale(0.7) rotate(-8deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .logo-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .logo-ring img { width: 44px; height: 44px; object-fit: contain; filter: invert(1); }

    .header h1 {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1.2px;
      color: var(--black);
      line-height: 1;
    }

    .header .tagline {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted2);
      font-weight: 400;
      letter-spacing: 0.1px;
    }

    /* ── Pill badge ── */
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 5px 12px;
      background: var(--black);
      color: #fff;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: fadeIn 0.6s ease 0.5s both;
    }

    .header-badge .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card ── */
    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.8) inset,
        0 20px 60px rgba(0,0,0,0.07),
        0 4px 16px rgba(0,0,0,0.04);
      animation: slideUp 0.7s cubic-bezier(.22,1,.36,1) 0.15s both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Upload zone ── */
    .upload-zone {
      position: relative;
      border: 1.5px dashed var(--border2);
      border-radius: 14px;
      padding: 44px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
      background: var(--surface);
      overflow: hidden;
    }

    .upload-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0.02), transparent 70%);
      pointer-events: none;
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--black);
      background: var(--surface2);
      transform: translateY(-1px);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon-wrap {
      width: 56px;
      height: 56px;
      margin: 0 auto 18px;
      background: var(--black);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    }

    .upload-zone:hover .upload-icon-wrap {
      transform: translateY(-3px) scale(1.05);
    }

    .upload-icon-wrap svg { width: 22px; height: 22px; stroke: #fff; }

    .upload-zone h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
    }

    .upload-zone p {
      font-size: 12px;
      color: var(--muted2);
    }

    .upload-zone .badges {
      display: inline-flex;
      gap: 6px;
      margin-top: 16px;
    }

    .upload-zone .badges span {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--muted);
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    /* ── Preview ── */
    #preview-wrap {
      display: none;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border);
      background: #000;
    }

    #preview {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      display: block;
    }

    .preview-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
      pointer-events: none;
    }

    .change-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.1);
      color: #333;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .change-btn:hover { background: #fff; color: #000; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 22px 0;
    }

    /* ── Analyse button ── */
    .predict-btn {
      width: 100%;
      padding: 16px;
      background: var(--black);
      color: #fff;
      border: none;
      border-radius: 13px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
    }

    .predict-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }

    /* shimmer sweep */
    .predict-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transition: left 0.5s ease;
    }

    .predict-btn:hover:not(:disabled)::before { left: 160%; }

    .predict-btn:hover:not(:disabled) {
      background: #1a1a1a;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.2);
    }

    .predict-btn:active:not(:disabled) { transform: translateY(0); }

    .predict-btn:disabled {
      background: var(--surface2);
      color: var(--muted2);
      cursor: not-allowed;
      box-shadow: none;
    }

    .predict-btn:disabled::after,
    .predict-btn:disabled::before { display: none; }

    .predict-btn.loading {
      background: var(--surface2);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border2);
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result ── */
    .result {
      display: none;
      margin-top: 20px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      animation: fadeUp 0.45s cubic-bezier(.22,1,.36,1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-strip {
      height: 3px;
      width: 100%;
    }

    .result.male   .result-strip { background: linear-gradient(90deg, #0a0a0a, #525252); }
    .result.female .result-strip { background: linear-gradient(90deg, #525252, #0a0a0a); }
    .result.uncertain .result-strip { background: linear-gradient(90deg, #a3a3a3, #525252); }

    .result-body {
      padding: 20px 22px 22px;
      background: var(--surface);
    }

    .result-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .result-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      background: var(--black);
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      animation: iconBounce 0.5s cubic-bezier(.34,1.56,.64,1) 0.1s both;
    }

    @keyframes iconBounce {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .result-meta { flex: 1; }

    .result-eyebrow {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted2);
      margin-bottom: 3px;
    }

    .result-prediction {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.8px;
      line-height: 1;
      color: var(--black);
    }

    .result-confidence {
      font-size: 11px;
      color: var(--muted2);
      margin-top: 4px;
    }

    /* Probability bars */
    .prob-section { display: flex; flex-direction: column; gap: 10px; }

    .prob-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .prob-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      width: 54px;
      flex-shrink: 0;
    }

    .prob-track {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .prob-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      background: var(--black);
      transition: width 0.9s cubic-bezier(.22,1,.36,1);
    }

    .prob-fill.female { background: #525252; }

    .prob-value {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      width: 46px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ── Error ── */
    .error-msg {
      display: none;
      margin-top: 16px;
      padding: 13px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: #dc2626;
      align-items: center;
      gap: 10px;
    }

    .error-msg svg { width: 16px; height: 16px; stroke: #dc2626; flex-shrink: 0; }

    /* ── Footer ── */
    .footer {
      margin-top: 22px;
      text-align: center;
      font-size: 11px;
      color: var(--muted2);
      animation: fadeIn 0.6s ease 0.5s both;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .footer-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--border2);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 20px; }
      .header h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <!-- Header -->
    <div class="header">
      <div class="logo-ring">
        <img src="/logo" alt="Monarch logo" />
      </div>
      <h1>Monarch</h1>
      <p class="tagline">Deep-learning gender classification · CNN model</p>
      <div class="header-badge">
        <span class="dot"></span>
        Model Active
      </div>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Upload zone -->
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*" />
        <div class="upload-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <h3>Drop an image here</h3>
        <p>or click to browse your files</p>
        <div class="badges">
          <span>JPG</span><span>PNG</span><span>WEBP</span>
        </div>
      </div>

      <!-- Preview -->
      <div id="preview-wrap">
        <img id="preview" alt="Uploaded image preview" />
        <div class="preview-overlay"></div>
        <button class="change-btn" onclick="resetUpload()">✕ Change</button>
      </div>

      <div class="divider"></div>

      <!-- Analyse button -->
      <button class="predict-btn" id="predictBtn" onclick="predict()" disabled>
        Analyse Image
      </button>

      <!-- Result -->
      <div class="result" id="result">
        <div class="result-strip"></div>
        <div class="result-body">
          <div class="result-top">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-meta">
              <div class="result-eyebrow">Prediction</div>
              <div class="result-prediction" id="predictionText"></div>
              <div class="result-confidence" id="confidenceText"></div>
            </div>
          </div>
          <div class="prob-section">
            <div class="prob-row">
              <span class="prob-label">Male</span>
              <div class="prob-track"><div class="prob-fill male" id="maleBar"></div></div>
              <span class="prob-value" id="maleVal"></span>
            </div>
            <div class="prob-row">
              <span class="prob-label">Female</span>
              <div class="prob-track"><div class="prob-fill female" id="femaleBar"></div></div>
              <span class="prob-value" id="femaleVal"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Error -->
      <div class="error-msg" id="errorMsg">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText"></span>
      </div>

    </div>

    <!-- Footer -->
    <div class="footer">
      <span>Monarch</span>
      <div class="footer-dot"></div>
      <span>CNN · TensorFlow</span>
      <div class="footer-dot"></div>
      <span>ML Assignment</span>
    </div>

  </div>

<script>
  const fileInput   = document.getElementById('fileInput');
  const uploadZone  = document.getElementById('uploadZone');
  const previewWrap = document.getElementById('preview-wrap');
  const preview     = document.getElementById('preview');
  const predictBtn  = document.getElementById('predictBtn');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadPreview(fileInput.files[0]);
  });

  uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', ()  => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const dt = new DataTransfer();
      dt.items.add(file);
      fileInput.files = dt.files;
      loadPreview(file);
    }
  });

  function loadPreview(file) {
    preview.src = URL.createObjectURL(file);
    previewWrap.style.display = 'block';
    uploadZone.style.display  = 'none';
    predictBtn.disabled = false;
    hide('result');
    hideError();
  }

  function resetUpload() {
    fileInput.value = '';
    previewWrap.style.display = 'none';
    uploadZone.style.display  = 'block';
    predictBtn.disabled = true;
    hide('result');
    hideError();
  }

  async function predict() {
    const file = fileInput.files[0];
    if (!file) return;

    predictBtn.disabled = true;
    predictBtn.classList.add('loading');
    predictBtn.innerHTML = '<span class="spinner"></span>Analysing…';
    hide('result');
    hideError();

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res  = await fetch('/predict', { method: 'POST', body: formData });
      const data = await res.json();
      data.error ? showError(data.error) : showResult(data);
    } catch {
      showError('Network error — please try again.');
    }

    predictBtn.disabled = false;
    predictBtn.classList.remove('loading');
    predictBtn.innerHTML = 'Analyse Image';
  }

  const ICONS = { Male: '♂', Female: '♀', Uncertain: '?' };
  const CONF_LABELS = {
    Male:      'Classified as male with high confidence',
    Female:    'Classified as female with high confidence',
    Uncertain: 'Confidence below threshold — result uncertain',
  };

  function showResult(data) {
    const maleRaw   = parseFloat(data.male_raw);
    const femaleRaw = parseFloat(data.female_raw);
    const pred      = data.prediction;

    const resultDiv = document.getElementById('result');
    resultDiv.className = 'result ' + pred.toLowerCase();
    resultDiv.style.display = 'block';

    document.getElementById('resultIcon').textContent     = ICONS[pred] ?? '?';
    document.getElementById('predictionText').textContent = pred;
    document.getElementById('confidenceText').textContent = CONF_LABELS[pred] ?? '';
    document.getElementById('maleVal').textContent        = data.male_probability;
    document.getElementById('femaleVal').textContent      = data.female_probability;

    requestAnimationFrame(() => {
      document.getElementById('maleBar').style.width   = maleRaw   + '%';
      document.getElementById('femaleBar').style.width = femaleRaw + '%';
    });
  }

  function hide(id)  { document.getElementById(id).style.display = 'none'; }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    document.getElementById('errorText').textContent = msg;
    el.style.display = 'flex';
  }

  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }
</script>
</body>
</html>
